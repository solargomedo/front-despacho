name: Build and deploy frontend

on:
  push:
    branches:
      - deploy

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            VITE_API_VENTAS=${{ secrets.VITE_API_VENTAS }}
            VITE_API_DESPACHOS=${{ secrets.VITE_API_DESPACHOS }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/front-despacho:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/front-despacho:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy production compose to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.FRONTEND_EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: docker-compose.prod.yml
          target: ~/innovatech-frontend

      - name: Deploy frontend on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.FRONTEND_EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/innovatech-frontend
            cat > .env <<EOF
            REGISTRY_USER=${{ secrets.DOCKERHUB_USERNAME }}
            IMAGE_TAG=${{ github.sha }}
            FRONTEND_PORT=${{ secrets.FRONTEND_PORT }}
            EOF
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
