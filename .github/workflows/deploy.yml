name: Deploy Frontend to ECR

on:
  push:
    branches:
      - deploy

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: "282003745193"
  ECR_REGISTRY: 282003745193.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: innovatech-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend image amd64
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --provenance=false \
            --push \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:amd64 \
            --build-arg VITE_API_VENTAS=http://ventas-api-service:8080 \
            --build-arg VITE_API_DESPACHOS=http://despachos-api-service:8081 \
            .